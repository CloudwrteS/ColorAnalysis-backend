spring.application.name=ColorAnalysis-backend

# ---- 数据库配置 ----
spring.datasource.url=jdbc:mysql://localhost:3306/color_analysis?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 设置：开发阶段可用 update 自动建表，生产环境使用 Flyway/Liquibase 管理
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# (可选) Flyway 自动执行 db/migration 下的脚本
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration

# 通过 SQL 初始化脚本修复增量表结构（适配本地环境未安装 mysql 客户端）
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init/schema_patch.sql

python.service.url=http://localhost:5000

# JWT configuration
jwt.secret=MySuperSecretKeyForJWTThatIsLongEnoughToBeSecureAndHas256Bits1234567890abcdef
jwt.expiration=3600000

# local file storage base directory
storage.base-dir=storage
